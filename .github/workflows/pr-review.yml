name: Protocol Liaison (PR Reviewer)

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  audit:
    name: Institutional PR Audit
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Review Core Logic
        id: build_review
        continue-on-error: true
        run: |
          cd smartcontract
          cargo test --all && cargo build --target wasm32-unknown-unknown --release

      - name: ❌ Handle Review Failure
        if: steps.build_review.outcome == 'failure'
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body "### ❌ Institutional Review Required
          
          Inconsistencies were found in this submission.
          
          **Required Action:**
          1. **Review logs**: Review the logs to identify the failing tests or compilation errors.
          2. **Audit Alignment**: Ensure the code aligns with our 'Must Do' standards (Traceability, Safety, Builds).
          3. **Stay in Sync**: Ensure your local environment is synchronized with the upstream project. Run:
             \`\`\`bash
             git fetch origin
             git pull origin main
             \`\`\`
          4. Sync your fork on GitHub and pull the latest changes to your local branch.
          5. **Update PR**: Push your fix to update the PR, or you can delete the PR and make a new one. Either way works for the project.
          
          *This PR cannot be merged until the review is successful.*"
          exit 1

      - name: ✅ Handle Review Success
        if: steps.build_review.outcome == 'success'
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body "### ✅ Review Successful
          
          The logic and build integrity of this submission have been verified. 
          
          **Status:** Perfect Alignment.
          **Action:** Merging into \`main\`...
          
          *Project maintained by @bbkenny.*"
          
          gh pr merge ${{ github.event.pull_request.number }} --merge --auto
